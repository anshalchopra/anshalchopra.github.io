<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Character | Trial</title>
    <style>
        :root {
            --bg-color: #F8F1E5; /* Cream Gelato */
            --char-color: #FF7B54;
            --eye-color: #2D4263;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            color: #333;
        }

        .instructions {
            position: absolute;
            top: 40px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 500;
            color: #8c7e6c;
            opacity: 0.8;
            pointer-events: none;
        }

        #character {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: var(--char-color);
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(255, 123, 84, 0.4);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s;
            will-change: transform;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding-bottom: 10px;
            box-sizing: border-box;
        }

        .eye {
            width: 10px;
            height: 14px;
            background-color: var(--eye-color);
            border-radius: 5px;
            position: relative;
            animation: blink 4s infinite;
        }

        .eye::after {
            content: '';
            position: absolute;
            top: 2px;
            right: 2px;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
        }

        @keyframes blink {
            0%, 4%, 100% { transform: scaleY(1); }
            2% { transform: scaleY(0.1); }
        }

        /* Movement styles */
        .move-up { transform: translate(-50%, -50%) rotateX(-10deg) translateY(-5px); }
        .move-down { transform: translate(-50%, -50%) rotateX(10deg) translateY(5px); }
        .move-left { transform: translate(-50%, -50%) rotateY(-15deg) translateX(-5px); }
        .move-right { transform: translate(-50%, -50%) rotateY(15deg) translateX(5px); }

    </style>
</head>
<body>

    <div class="instructions">
        Use <b>Arrow Keys</b> to move the character
    </div>

    <!-- The interactive character -->
    <div id="character">
        <div class="eye"></div>
        <div class="eye"></div>
    </div>

    <script>
        const character = document.getElementById('character');
        
        let posX = window.innerWidth / 2;
        let posY = window.innerHeight / 2;
        const speed = 10;
        
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = true;
                e.preventDefault(); // Prevent scrolling
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = false;
                character.className = ''; // reset movement classes
            }
        });

        function animate() {
            let moving = false;
            let currentClass = '';

            if (keys.ArrowUp) {
                posY -= speed;
                currentClass = 'move-up';
                moving = true;
            }
            if (keys.ArrowDown) {
                posY += speed;
                currentClass = 'move-down';
                moving = true;
            }
            if (keys.ArrowLeft) {
                posX -= speed;
                currentClass = 'move-left';
                moving = true;
            }
            if (keys.ArrowRight) {
                posX += speed;
                currentClass = 'move-right';
                moving = true;
            }

            // Boundary checks
            const limitX = window.innerWidth;
            const limitY = window.innerHeight;
            const charSize = 30; // Half of 60px

            if (posX < charSize) posX = charSize;
            if (posX > limitX - charSize) posX = limitX - charSize;
            if (posY < charSize) posY = charSize;
            if (posY > limitY - charSize) posY = limitY - charSize;

            if (moving) {
                character.style.left = `${posX}px`;
                character.style.top = `${posY}px`;
                character.className = currentClass;
            }

            requestAnimationFrame(animate);
        }

        // Start animation loop
        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            posX = window.innerWidth / 2;
            posY = window.innerHeight / 2;
            character.style.left = `${posX}px`;
            character.style.top = `${posY}px`;
        });
    </script>
</body>
</html>
